# ===================================
#  Form Field Definitions
# ===================================

tabs:
    defaultTab: Tax Class
    fields:
        name:
            label: Name

        description:
            label: Description
            commentAbove: Providing a description here is optional.
            type: textarea
            size: small

        is_default:
            label: Default
            comment: Place a tick in this checkbox if you want to use this tax table by default.
            type: checkbox

        rates:
            tab: Rates
            type: datatable
            size: large
            columns:
                tax_name:
                    title: Tax Name
                    width: 100px

                rate:
                    title: Rate
                    width: 80px
                    align: right
                    # type: number

                country:
                    title: Country
                    type: dropdown
                    strict: false

                state:
                    title: State
                    type: dropdown
                    strict: false
                    dependsOn: country

                zip:
                    title: Zip
                    width: 100px

                city:
                    title: City

                priority:
                    title: Priority
                    width: 80px
                    align: right
                    # type: number

                is_compound:
                    title: Compound
                    width: 100px
                    type: checkbox
