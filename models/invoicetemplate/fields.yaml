# ===================================
#  Form Field Definitions
# ===================================

fields:
    name:
        label: Name
        tab: Invoice
        span: left

    code:
        label: API Code
        tab: Invoice
        span: right

    is_default:
        label: Default
        comment: Use this invoice template by default for new invoices.
        tab: Invoice
        type: checkbox

tabs:
    fields:
        _hint:
            type: hint
            comment: Customize these fields using the template in the HTML tab.
            tab: Invoice

        content_html:
            type: codeeditor
            size: giant
            tab: HTML
            language: html
            stretch: true

        content_css:
            type: codeeditor
            size: giant
            tab: CSS
            language: css
            stretch: true
