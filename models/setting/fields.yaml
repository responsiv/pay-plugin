# ===================================
#  Field Definitions
# ===================================

tabs:
    fields:

        invoice_prefix:
            label: Invoice Prefix
            comment: Enter a value to prefix all invoice numbers.
            tab: Invoices
            span: auto

        new_invoice_number:
            label: New Invoice Number
            comment: Use this to set the next invoice number, must be more than the current invoice number.
            tab: Invoices
            span: auto

        send_invoice_on_payment:
            label: Email Invoice on Payment
            comment: Automatically email the invoice to the customer when payment is processed.
            tab: Invoices
            type: switch

        enable_credit_notes:
            label: Enable Store Credit
            comment: Allow customers to accumulate and spend store credit at checkout.
            tab: Credit
            type: switch
